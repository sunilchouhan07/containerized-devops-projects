services:
  web: 
    build: .
    container_name: flask_app
    ports:
      - 5000
    environment:
      APP_ENV: production
    depends_on:
      - db 
    

  db:
    image: postgres:15 
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin@123
      POSTGRES_DB: mydb 
    ports:
      - "5432:5432"
    
    volumes:
      - pgdata:/var/lib/postgresql/data 
    
volumes:
  pgdata: