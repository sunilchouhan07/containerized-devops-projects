services:
  app:
    build: .
    container_name: node-app 
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db 
      DB_USER: admin 
      DB_PASSWORD: admin123 
      DB_NAME: mydb
    depends_on:
      - db
    
  db:
    image: postgres:15
    container_name: postgres-db 
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data 
  
volumes:
  pgdata:
