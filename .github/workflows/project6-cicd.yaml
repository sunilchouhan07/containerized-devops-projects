name: automate-build

on: 
  push:
    branches:
      - main

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo 
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: build and push backend 
        working-directory: project6/backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/node-backend-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/node-backend-app:latest
      
      - name: build and push frontend 
        working-directory: project6/frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/react-frontend-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/react-frontend-app:latest
